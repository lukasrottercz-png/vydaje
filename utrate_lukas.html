<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Výdaje — Lukáš</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,sans-serif;background:#f2f2f7;color:#1c1c1e;min-height:100vh;padding-bottom:100px}
.navbar{background:#fff;border-bottom:1px solid #e0e0e0;padding:16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.navbar-title{font-size:17px;font-weight:600;color:#1c1c1e}
.nav-btn{background:#007aff;color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:15px;font-weight:600;cursor:pointer}
.tabbar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e0e0e0;display:flex;padding:8px 0 20px;z-index:10}
.tbi{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;padding:4px 0}
.tbi-icon{font-size:22px}
.tbi-label{font-size:10px;color:#8e8e93}
.tbi.on .tbi-label{color:#007aff}
.content{padding:16px}
.sec-hdr{font-size:13px;color:#6c6c70;text-transform:uppercase;letter-spacing:.04em;padding:16px 4px 8px;display:flex;justify-content:space-between}
.card{background:#fff;border-radius:13px;overflow:hidden;margin-bottom:16px;border:1px solid #e0e0e0}
.crow{display:flex;align-items:center;padding:14px 16px;border-bottom:1px solid #f0f0f0;gap:12px}
.crow:last-child{border-bottom:none}
.crow-icon{font-size:22px;width:32px;text-align:center}
.crow-label{flex:1;font-size:17px;color:#1c1c1e}
.crow-val{font-size:15px;font-weight:600;color:#ff3b30}
.empty{text-align:center;padding:60px 20px}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-title{font-size:17px;font-weight:500;color:#1c1c1e;margin-bottom:8px}
.empty-sub{font-size:15px;color:#8e8e93}
/* ADD FORM */
.form-page{display:none;padding-bottom:40px}
.form-page.on{display:block}
.home-page{display:block}
.home-page.off{display:none}
.back-btn{background:none;border:none;color:#007aff;font-size:17px;cursor:pointer;padding:4px 0}
.amount-box{background:#fff;border-radius:13px;padding:24px 16px;text-align:center;margin-bottom:16px;border:1px solid #e0e0e0}
.amt-inp{font-size:52px;font-weight:200;border:none;background:none;color:#1c1c1e;text-align:center;width:100%;outline:none}
.amt-inp::placeholder{color:#c7c7cc}
.date-inp{border:none;background:none;color:#6c6c70;font-size:14px;text-align:center;margin-top:8px;display:block;width:100%}
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.cat-btn{background:#fff;border:2px solid #e0e0e0;border-radius:13px;padding:14px 8px;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer}
.cat-btn.on{border-color:#007aff;background:#e8f0fe}
.cat-icon{font-size:26px}
.cat-lbl{font-size:11px;color:#6c6c70;text-align:center;line-height:1.3}
.cat-btn.on .cat-lbl{color:#007aff;font-weight:600}
.sub-list{background:#fff;border-radius:13px;overflow:hidden;margin-bottom:16px;border:1px solid #e0e0e0}
.sub-item{display:flex;align-items:center;padding:14px 16px;border-bottom:1px solid #f0f0f0;cursor:pointer;gap:12px}
.sub-item:last-child{border-bottom:none}
.sub-dot{width:22px;height:22px;border-radius:50%;border:2px solid #c7c7cc;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;color:transparent}
.sub-item.on .sub-dot{background:#007aff;border-color:#007aff;color:#fff}
.sub-lbl{font-size:17px;color:#1c1c1e}
.note-inp{background:#fff;border-radius:13px;padding:14px 16px;font-size:17px;color:#1c1c1e;border:1px solid #e0e0e0;width:100%;font-family:inherit;resize:none;display:block;margin-bottom:16px;min-height:80px}
.save-btn{width:100%;padding:16px;background:#007aff;color:#fff;border:none;border-radius:13px;font-size:17px;font-weight:600;cursor:pointer;font-family:inherit}
.save-btn:active{opacity:.8}
.exp-row{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid #f0f0f0;gap:12px}
.exp-row:last-child{border-bottom:none}
.exp-ico{font-size:20px;width:36px;height:36px;background:#f2f2f7;border-radius:8px;display:flex;align-items:center;justify-content:center}
.exp-info{flex:1;min-width:0}
.exp-cat{font-size:15px;font-weight:500;color:#1c1c1e}
.exp-sub{font-size:13px;color:#6c6c70;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.exp-amt{font-size:15px;font-weight:600;color:#ff3b30;text-align:right}
.big-sum{text-align:center;padding:24px 16px 0}
.big-amt{font-size:44px;font-weight:200;letter-spacing:-1px;color:#ff3b30}
.big-lbl{font-size:14px;color:#6c6c70;margin-top:4px;margin-bottom:8px}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(40,40,40,.9);color:#fff;padding:10px 20px;border-radius:20px;font-size:15px;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;z-index:999}
.toast.on{opacity:1}
.bar-bg{height:4px;background:#f2f2f7;border-radius:2px;margin-top:5px}
.bar-fill{height:100%;background:#007aff;border-radius:2px}
</style>
</head>
<body>

<div id="home-page">
  <div class="navbar">
    <span class="navbar-title" id="nav-title">Výdaje — Lukáš</span>
    <button class="nav-btn" id="nav-action" onclick="openAdd()">+ Přidat</button>
  </div>
  <div class="content" id="main-content"></div>
  <div class="tabbar">
    <button class="tbi on" id="tab0" onclick="tab(0)"><span class="tbi-icon">🏠</span><span class="tbi-label">Přehled</span></button>
    <button class="tbi" id="tab1" onclick="tab(1)"><span class="tbi-icon">📊</span><span class="tbi-label">Kategorie</span></button>
    <button class="tbi" id="tab2" onclick="tab(2)"><span class="tbi-icon">⬇️</span><span class="tbi-label">Export</span></button>
  </div>
</div>

<div id="add-page" style="display:none">
  <div class="navbar">
    <button class="back-btn" onclick="goHome()">‹ Zpět</button>
    <span class="navbar-title">Nový výdaj</span>
    <button class="nav-btn" onclick="doSave()">Uložit</button>
  </div>
  <div class="content" id="add-content"></div>
</div>

<div class="toast" id="toast"></div>

<script>
var CATS=[
  {k:'bydleni',i:'🏠',l:'Bydlení',s:['Nájem / záloha','Elektřina','Plyn','Internet','Opravy','Vybavení']},
  {k:'doprava',i:'🚗',l:'Doprava',s:['Pohonné hmoty','Pojištění','Servis','Dálniční známka','Parkování','MHD']},
  {k:'potraviny',i:'🛒',l:'Potraviny',s:['Supermarket','Tržnice','Drogerie']},
  {k:'stravovani',i:'🍽',l:'Stravování',s:['Restaurace','Kavárna','Rozvoz']},
  {k:'deti',i:'👶',l:'Děti',s:['Jesle / školka','Kroužky','Oblečení','Hračky','Lékaři']},
  {k:'zdravi',i:'🏥',l:'Zdraví',s:['Lékař','Lékárna','Sportování']},
  {k:'obleceni',i:'👕',l:'Oblečení',s:['Oblečení','Obuv']},
  {k:'cestovani',i:'✈️',l:'Cestování',s:['Dovolená','Letenky','Hotel','Výlety']},
  {k:'predplatne',i:'📱',l:'Předplatné',s:['Streaming','Software','Telefon']},
  {k:'pojisteni',i:'🛡',l:'Pojištění',s:['Životní','Právní (DAS)','Jiné']},
  {k:'sporeni',i:'💰',l:'Spoření',s:['Stavební spoření','Penzijní','Investice']},
  {k:'ostatni',i:'❓',l:'Ostatní',s:['Dárky','Charity','Různé']}
];

var exps=[];
try{exps=JSON.parse(localStorage.getItem('lkv3')||'[]')}catch(e){exps=[]}

var curTab=0;
var selCat='';
var selSub='';

function saveAll(){try{localStorage.setItem('lkv3',JSON.stringify(exps))}catch(e){}}
function fmt(n){return Math.round(n).toLocaleString('cs-CZ')+' Kč'}
function today(){var d=new Date();return d.toISOString().slice(0,10)}
function catByKey(k){for(var i=0;i<CATS.length;i++){if(CATS[i].k===k)return CATS[i]}return null}

function showToast(m){
  var t=document.getElementById('toast');
  t.textContent=m;t.className='toast on';
  setTimeout(function(){t.className='toast'},2000);
}

function tab(i){
  curTab=i;
  for(var j=0;j<3;j++){
    var el=document.getElementById('tab'+j);
    if(el)el.className='tbi'+(i===j?' on':'');
  }
  renderHome();
}

function goHome(){
  document.getElementById('add-page').style.display='none';
  document.getElementById('home-page').style.display='block';
  renderHome();
}

function openAdd(){
  selCat='';selSub='';
  document.getElementById('home-page').style.display='none';
  document.getElementById('add-page').style.display='block';
  buildAddForm();
}

function buildAddForm(){
  var html='<div class="amount-box">'
    +'<input id="amt" class="amt-inp" type="number" inputmode="decimal" placeholder="0">'
    +'<input id="dt" class="date-inp" type="date" value="'+today()+'">'
    +'</div>'
    +'<div class="sec-hdr">Kategorie</div>'
    +'<div class="cat-grid">';
  for(var i=0;i<CATS.length;i++){
    var c=CATS[i];
    html+='<button class="cat-btn" id="cb-'+c.k+'" onclick="pickCat(\''+c.k+'\')">'
      +'<span class="cat-icon">'+c.i+'</span>'
      +'<span class="cat-lbl">'+c.l+'</span>'
      +'</button>';
  }
  html+='</div>'
    +'<div id="sub-section"></div>'
    +'<div class="sec-hdr">Poznámka</div>'
    +'<textarea id="note" class="note-inp" placeholder="Volitelná poznámka…"></textarea>'
    +'<button class="save-btn" onclick="doSave()">Uložit výdaj</button>';
  document.getElementById('add-content').innerHTML=html;
}

function pickCat(k){
  selCat=k;selSub='';
  // Zvýrazni vybranou kategorii
  for(var i=0;i<CATS.length;i++){
    var el=document.getElementById('cb-'+CATS[i].k);
    if(el)el.className='cat-btn'+(CATS[i].k===k?' on':'');
  }
  // Zobraz podkategorie
  var cat=catByKey(k);
  var html='';
  if(cat){
    html='<div class="sec-hdr">Podkategorie</div><div class="sub-list">';
    for(var j=0;j<cat.s.length;j++){
      var s=cat.s[j];
      html+='<div class="sub-item" id="si-'+j+'" onclick="pickSub(\''+s.replace(/'/g,"\\'")+'\')">'
        +'<div class="sub-dot">✓</div>'
        +'<span class="sub-lbl">'+s+'</span>'
        +'</div>';
    }
    html+='</div>';
  }
  document.getElementById('sub-section').innerHTML=html;
}

function pickSub(s){
  selSub=(selSub===s)?'':s;
  var items=document.querySelectorAll('.sub-item');
  for(var i=0;i<items.length;i++){
    var lbl=items[i].querySelector('.sub-lbl');
    if(lbl){items[i].className='sub-item'+(lbl.textContent===selSub?' on':'');}
  }
}

function doSave(){
  var amtEl=document.getElementById('amt');
  var dtEl=document.getElementById('dt');
  var noteEl=document.getElementById('note');
  if(!amtEl){showToast('Chyba formuláře');return}
  var amount=parseFloat(amtEl.value)||0;
  if(amount<=0){showToast('Zadej částku');return}
  if(!selCat){showToast('Vyber kategorii');return}
  var entry={
    id:Date.now().toString(),
    amount:amount,
    catKey:selCat,
    subcat:selSub,
    note:noteEl?noteEl.value:'',
    date:dtEl?dtEl.value:today()
  };
  exps.push(entry);
  saveAll();
  showToast('Uloženo ✓');
  goHome();
}

function renderHome(){
  var el=document.getElementById('main-content');
  if(!el)return;
  if(curTab===0)el.innerHTML=renderPrehled();
  else if(curTab===1)el.innerHTML=renderKat();
  else el.innerHTML=renderExport();
}

function renderPrehled(){
  if(!exps.length){
    return '<div class="empty">'
      +'<div class="empty-icon">🧾</div>'
      +'<div class="empty-title">Žádné výdaje</div>'
      +'<div class="empty-sub">Klepni na + Přidat nahoře</div>'
      +'</div>';
  }
  var now=new Date();
  var thisM=exps.filter(function(e){
    var d=new Date(e.date);
    return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
  });
  var total=thisM.reduce(function(s,e){return s+(e.amount||0)},0);
  var byDay={};
  var sorted=[].concat(exps).sort(function(a,b){return b.date.localeCompare(a.date)});
  sorted.forEach(function(e){
    if(!byDay[e.date])byDay[e.date]=[];
    byDay[e.date].push(e);
  });
  var now2=new Date();
  var monthLbl=now2.toLocaleDateString('cs-CZ',{month:'long',year:'numeric'});
  var h='<div class="big-sum"><div class="big-amt">'+fmt(total)+'</div><div class="big-lbl">'+monthLbl+'</div></div>';
  var tod=today();
  Object.keys(byDay).forEach(function(date){
    var items=byDay[date];
    var dt=new Date(date+'T12:00:00');
    var dayLbl=date===tod?'Dnes':dt.toLocaleDateString('cs-CZ',{weekday:'long',day:'numeric',month:'short'});
    var dayTotal=items.reduce(function(s,e){return s+(e.amount||0)},0);
    h+='<div class="sec-hdr"><span>'+dayLbl+'</span><span style="color:#ff3b30">'+fmt(dayTotal)+'</span></div>';
    h+='<div class="card">';
    items.forEach(function(e){
      var cat=catByKey(e.catKey);
      h+='<div class="exp-row" onclick="delExp(\''+e.id+'\')">'
        +'<div class="exp-ico">'+(cat?cat.i:'❓')+'</div>'
        +'<div class="exp-info">'
        +'<div class="exp-cat">'+(cat?cat.l:e.catKey)+'</div>'
        +'<div class="exp-sub">'+(e.subcat||'')+(e.note?' · '+e.note:'')+'</div>'
        +'</div>'
        +'<div class="exp-amt">'+fmt(e.amount)+'</div>'
        +'</div>';
    });
    h+='</div>';
  });
  return h;
}

function renderKat(){
  if(!exps.length)return'<div class="empty"><div class="empty-icon">📊</div><div class="empty-title">Žádná data</div></div>';
  var now=new Date();
  var thisM=exps.filter(function(e){var d=new Date(e.date);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear()});
  var byCat={};
  thisM.forEach(function(e){if(!byCat[e.catKey])byCat[e.catKey]=0;byCat[e.catKey]+=e.amount||0});
  var total=Object.values(byCat).reduce(function(s,v){return s+v},0);
  var entries=Object.entries(byCat).sort(function(a,b){return b[1]-a[1]});
  var monthLbl=now.toLocaleDateString('cs-CZ',{month:'long',year:'numeric'});
  var h='<div class="sec-hdr">'+monthLbl+' — '+fmt(total)+'</div><div class="card">';
  entries.forEach(function(pair){
    var k=pair[0],v=pair[1];
    var cat=catByKey(k);
    var pct=total>0?Math.round(v/total*100):0;
    h+='<div class="exp-row">'
      +'<div class="exp-ico">'+(cat?cat.i:'❓')+'</div>'
      +'<div class="exp-info">'
      +'<div class="exp-cat">'+(cat?cat.l:k)+'</div>'
      +'<div class="bar-bg"><div class="bar-fill" style="width:'+pct+'%"></div></div>'
      +'</div>'
      +'<div style="text-align:right;flex-shrink:0">'
      +'<div class="exp-amt">'+fmt(v)+'</div>'
      +'<div style="font-size:12px;color:#8e8e93">'+pct+' %</div>'
      +'</div>'
      +'</div>';
  });
  h+='</div>';
  return h;
}

function renderExport(){
  var total=exps.reduce(function(s,e){return s+(e.amount||0)},0);
  var h='<div class="card">'
    +'<div class="crow" onclick="exportCSV()"><div class="crow-icon">📤</div><div class="crow-label">Exportovat CSV</div></div>'
    +'<div class="crow" onclick="importCSV()"><div class="crow-icon">📥</div><div class="crow-label">Importovat CSV</div></div>'
    +'<div class="crow" onclick="clearAll()"><div class="crow-icon">🗑</div><div class="crow-label" style="color:#ff3b30">Smazat vše</div></div>'
    +'</div>'
    +'<input type="file" id="csv-file" accept=".csv" style="display:none" onchange="handleImport(this)">';
  var months={};
  exps.forEach(function(e){var m=e.date.slice(0,7);if(!months[m])months[m]=[];months[m].push(e)});
  if(Object.keys(months).length){
    h+='<div class="sec-hdr">Přehled po měsících — '+fmt(total)+'</div><div class="card">';
    Object.keys(months).sort(function(a,b){return b.localeCompare(a)}).forEach(function(m){
      var items=months[m];
      var t=items.reduce(function(s,e){return s+(e.amount||0)},0);
      var dt=new Date(m+'-01T12:00:00');
      var lbl=dt.toLocaleDateString('cs-CZ',{month:'long',year:'numeric'});
      h+='<div class="exp-row"><div class="exp-info"><div class="exp-cat">'+lbl+'</div><div class="exp-sub">'+items.length+' výdajů</div></div><div class="exp-amt">'+fmt(t)+'</div></div>';
    });
    h+='</div>';
  }
  return h;
}

function delExp(id){
  if(!confirm('Smazat výdaj?'))return;
  exps=exps.filter(function(e){return e.id!==id});
  saveAll();renderHome();showToast('Smazáno');
}

function importCSV(){
  var el=document.getElementById('csv-file');
  if(el)el.click();
}

function handleImport(input){
  var file=input.files[0];
  if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var text=e.target.result.replace(/^\uFEFF/,'');
      var lines=text.trim().split('\n');
      if(lines.length<2){showToast('CSV je prázdné');return}
      var imported=0;
      for(var i=1;i<lines.length;i++){
        var cols=lines[i].split(';');
        if(cols.length<4)continue;
        var date=cols[0].trim();
        var catLabel=cols[1].trim();
        var subcat=cols[2].trim();
        var amount=parseFloat(cols[3])||0;
        var note=cols[4]?cols[4].trim():'';
        if(!date||amount<=0)continue;
        // Najdi catKey podle labelu
        var catKey='ostatni';
        for(var j=0;j<CATS.length;j++){
          if(CATS[j].l===catLabel){catKey=CATS[j].k;break}
        }
        // Přidej jen pokud ještě neexistuje stejný záznam
        var dup=false;
        for(var k=0;k<exps.length;k++){
          if(exps[k].date===date&&exps[k].amount===amount&&exps[k].catKey===catKey){dup=true;break}
        }
        if(!dup){
          exps.push({id:Date.now().toString()+i,amount:amount,catKey:catKey,subcat:subcat,note:note,date:date});
          imported++;
        }
      }
      saveAll();
      showToast('Importováno '+imported+' výdajů ✓');
      renderHome();
    }catch(err){
      showToast('Chyba při importu');
    }
  };
  reader.readAsText(file,'UTF-8');
  input.value='';
}

function exportCSV(){
  if(!exps.length){showToast('Žádná data');return}
  var hdr=['datum','kategorie','podkategorie','castka','poznamka'];
  var rows=[hdr.join(';')];
  [].concat(exps).sort(function(a,b){return a.date.localeCompare(b.date)}).forEach(function(e){
    var cat=catByKey(e.catKey);
    rows.push([e.date,cat?cat.l:e.catKey,e.subcat||'',e.amount,e.note||''].join(';'));
  });
  var blob=new Blob(['\uFEFF'+rows.join('\n')],{type:'text/csv;charset=utf-8;'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='vydaje_'+today()+'.csv';a.click();showToast('Exportováno');
}

function clearAll(){
  if(!confirm('Smazat vše?'))return;
  exps=[];saveAll();renderHome();showToast('Smazáno');
}

// Spuštění
window.onload=function(){renderHome()};
</script>
</body>
</html>
